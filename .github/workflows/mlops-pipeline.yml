name: MLOps Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: churn-model-bucket-cicd-jp

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dataset
        run: python generate_data.py

      - name: Train model
        run: python train.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy model to S3
        run: |
          aws s3 cp models/churn_model.pkl s3://${{ env.S3_BUCKET }}/models/churn_model.pkl
          echo "Model deployed to S3 successfully!!!"


      - name: Update inference.yaml with s3 model path
        run: |
          MODEL_URL="s3://churn-model-demo-umesh-bucket/models/churn_model.pkl"
          sed -i "s|MODEL_URL_PLACEHOLDER|$MODEL_URL|g" k8s/inference.yaml


      - name: Commit updated inference.yaml
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8S/inference.yaml
          git commit -m "Update inference.yaml with S3 model path"
          git push || echo "No changes to commit"
